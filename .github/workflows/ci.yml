name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run release (no tags created)'
        type: boolean
        default: false

jobs:
  discover:
    runs-on: ubuntu-latest
    outputs:
      modules: ${{ steps.find.outputs.modules }}
      agents: ${{ steps.find.outputs.agents }}
      agent_tests: ${{ steps.find.outputs.agent_tests }}
    steps:
      - uses: actions/checkout@v6
      - name: Find modules and agents
        id: find
        run: |
          # Find all modules with dagger.json (excluding tests/)
          ALL=$(find . -maxdepth 2 -name "dagger.json" -not -path "./tests/*" | \
            xargs -I {} dirname {} | sed 's|^\./||' | sort -u)

          # Classify: agent if it has a src/*/prompts/ directory
          AGENTS=()
          MODULES=()
          for mod in $ALL; do
            if ls "$mod"/src/*/prompts/ >/dev/null 2>&1; then
              AGENTS+=("$mod")
            else
              MODULES+=("$mod")
            fi
          done

          # Output non-agent modules as JSON array
          MODULES_JSON=$(printf '%s\n' "${MODULES[@]}" | jq -R -s -c 'split("\n") | map(select(length > 0))')
          echo "modules=$MODULES_JSON" >> $GITHUB_OUTPUT

          # Output agent names as JSON array
          AGENTS_JSON=$(printf '%s\n' "${AGENTS[@]}" | jq -R -s -c 'split("\n") | map(select(length > 0))')
          echo "agents=$AGENTS_JSON" >> $GITHUB_OUTPUT

          # Build flat agent test list: agent-assist, agent-review, etc.
          # If .agent-tests exists, read custom test suffixes; otherwise use defaults.
          DEFAULT_TESTS="assist review write-tests build upgrade"
          AGENT_TESTS=()
          for agent in "${AGENTS[@]}"; do
            if [ -f "$agent/.agent-tests" ]; then
              TESTS=$(grep -v '^#' "$agent/.agent-tests" | grep -v '^$' | tr '\n' ' ')
            else
              TESTS=$DEFAULT_TESTS
            fi
            for test in $TESTS; do
              AGENT_TESTS+=("${agent}-${test}")
            done
          done
          AGENT_TESTS_JSON=$(printf '%s\n' "${AGENT_TESTS[@]}" | jq -R -s -c 'split("\n") | map(select(length > 0))')
          echo "agent_tests=$AGENT_TESTS_JSON" >> $GITHUB_OUTPUT

          # Format discovered modules for step summary
          {
            echo "### Discovered modules"
            echo ""
            echo "| Type | Items |"
            echo "|------|-------|"
            echo "| Modules | $(echo "$MODULES_JSON" | jq -r 'map("`" + . + "`") | join(", ")') |"
            echo "| Agents | $(echo "$AGENTS_JSON" | jq -r 'map("`" + . + "`") | join(", ")') |"
            echo "| Agent tests | $(echo "$AGENT_TESTS_JSON" | jq -r 'map("`" + . + "`") | join(", ")') |"
          } >> $GITHUB_STEP_SUMMARY

  validate:
    needs: discover
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Setup Dagger
        uses: dagger/dagger-for-github@v8.3.0
        with:
          version: "0.19.11"
          verb: version
          cloud-token: ${{ secrets.DAGGER_CLOUD_TOKEN }}
      - name: Validate modules
        run: |
          # Combine modules and agents for validation
          ALL_MODULES=$(echo '${{ needs.discover.outputs.modules }}' '${{ needs.discover.outputs.agents }}' | jq -s 'add')

          LINE_LIMIT=600

          echo "## Modules" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          for module in $(echo "$ALL_MODULES" | jq -r '.[]'); do
            [ -f "$module/dagger.json" ] || { echo "ERROR: $module/dagger.json missing"; exit 1; }
            grep -q '"description"' "$module/dagger.json" || { echo "ERROR: $module missing description"; exit 1; }
            [ -f "$module/README.md" ] || { echo "ERROR: $module/README.md missing"; exit 1; }
            [ -d "$module/examples" ] || { echo "ERROR: $module/examples missing"; exit 1; }
            cd $module && FUNCS=$(dagger functions 2>/dev/null | tail -n +2 | awk '{print $1}') && cd ..

            # Check line counts — warn for source files exceeding the limit
            LINE_WARNINGS=""
            while IFS= read -r src_file; do
              LINES=$(wc -l < "$src_file")
              if [ "$LINES" -gt "$LINE_LIMIT" ]; then
                LINE_WARNINGS="$LINE_WARNINGS<br>:warning: \`$src_file\` has $LINES lines (limit: $LINE_LIMIT)"
              fi
            done < <(find "$module/src" -name "*.py" -o -name "*.ts" -o -name "*.go" 2>/dev/null || true)

            DESC=$(jq -r '.description // "No description"' "$module/dagger.json")
            {
              echo "<details>"
              if [ -n "$LINE_WARNINGS" ]; then
                echo "<summary>:warning: <strong>$module</strong> - $DESC</summary>"
                echo ""
                echo "$LINE_WARNINGS"
                echo ""
              else
                echo "<summary><strong>$module</strong> - $DESC</summary>"
              fi
              echo ""
              echo "| Function |"
              echo "|----------|"
              for func in $FUNCS; do echo "| \`$func\` |"; done
              echo ""
              echo "</details>"
              echo ""
            } >> $GITHUB_STEP_SUMMARY
          done

  test-modules:
    needs: [discover, validate]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        module: ${{ fromJson(needs.discover.outputs.modules) }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Restore Dagger engine cache
        uses: BYK/docker-volume-cache-action/restore@v1
        with:
          key: dagger-engine-${{ runner.os }}-v0.19.11
          volumes: dagger-engine

      - name: Setup Dagger
        uses: dagger/dagger-for-github@v8.3.0
        with:
          version: "0.19.11"
          verb: version
          cloud-token: ${{ secrets.DAGGER_CLOUD_TOKEN }}

      - name: Test ${{ matrix.module }}
        id: test
        env:
          _EXPERIMENTAL_DAGGER_RUNNER_HOST: "docker-image://registry.dagger.io/engine:v0.19.11?volume=dagger-engine"
          DAGGER_CLOUD_TOKEN: ${{ secrets.DAGGER_CLOUD_TOKEN }}
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
          GCP_DEVELOPER_KNOWLEDGE_API_KEY: ${{ secrets.GCP_DEVELOPER_KNOWLEDGE_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: ${{ vars.GEMINI_MODEL }}
        run: |
          MODULE="${{ matrix.module }}"
          ARGS=""

          # GCP modules need OIDC credentials and optionally SA key
          if [[ "$MODULE" == gcp-* ]]; then
            ARGS="--workload-identity-provider=${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}"
            ARGS="$ARGS --service-account=${{ secrets.GCP_SERVICE_ACCOUNT }}"
            ARGS="$ARGS --project-id=${{ secrets.GCP_PROJECT_ID }}"
            ARGS="$ARGS --oidc-token=env:ACTIONS_ID_TOKEN_REQUEST_TOKEN"
            ARGS="$ARGS --oidc-url=env:ACTIONS_ID_TOKEN_REQUEST_URL"
            ARGS="$ARGS --region=europe-west9"
            # Add service account key for multi-auth testing
            if [[ -n "$GCP_SA_KEY" ]]; then
              ARGS="$ARGS --credentials=env:GCP_SA_KEY"
            fi
          fi

          # Module-specific args
          case "$MODULE" in
            gcp-artifact-registry) ARGS="$ARGS --repository=${{ secrets.GCP_ARTIFACT_REGISTRY_REPOSITORY }}" ;;
            semver) ARGS="$ARGS --source=." ;;
          esac

          OUTPUT=$(dagger call -m tests "$MODULE" $ARGS 2>&1) || { echo "$OUTPUT"; exit 1; }
          echo "$OUTPUT"

          # Match both old format (PASS:/FAIL:) and new format ([OK]/[!!]/[--])
          RESULTS=$(echo "$OUTPUT" | grep -E '^\s*\[(OK|!!|--)\]|^PASS:|^FAIL:' || true)
          echo "output<<EOF" >> $GITHUB_OUTPUT
          echo "$RESULTS" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Summary
        if: always()
        run: |
          echo "## Test: ${{ matrix.module }}" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.test.outcome }}" == "success" ]; then
            echo ":white_check_mark: **PASSED**" >> $GITHUB_STEP_SUMMARY
          else
            echo ":x: **FAILED**" >> $GITHUB_STEP_SUMMARY
          fi
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat << 'ENDOFOUTPUT' >> $GITHUB_STEP_SUMMARY
          ${{ steps.test.outputs.output }}
          ENDOFOUTPUT
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Stop Dagger engine
        if: always()
        run: docker stop $(docker ps -q -f 'name=dagger-engine') 2>/dev/null || true

      - name: Save Dagger engine cache
        if: always()
        uses: BYK/docker-volume-cache-action/save@v1
        with:
          key: dagger-engine-${{ runner.os }}-v0.19.11
          volumes: dagger-engine

  test-agents:
    needs: [discover, validate]
    if: ${{ fromJson(needs.discover.outputs.agent_tests)[0] != null }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        test: ${{ fromJson(needs.discover.outputs.agent_tests) }}
    steps:
      - uses: actions/checkout@v6

      - name: Restore Dagger engine cache
        uses: BYK/docker-volume-cache-action/restore@v1
        with:
          key: dagger-engine-${{ runner.os }}-v0.19.11
          volumes: dagger-engine

      - name: Setup Dagger
        uses: dagger/dagger-for-github@v8.3.0
        with:
          version: "0.19.11"
          verb: version
          cloud-token: ${{ secrets.DAGGER_CLOUD_TOKEN }}

      - name: Test ${{ matrix.test }}
        id: test
        timeout-minutes: 20
        env:
          _EXPERIMENTAL_DAGGER_RUNNER_HOST: "docker-image://registry.dagger.io/engine:v0.19.11?volume=dagger-engine"
          DAGGER_CLOUD_TOKEN: ${{ secrets.DAGGER_CLOUD_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: ${{ vars.GEMINI_MODEL }}
          GCP_DEVELOPER_KNOWLEDGE_API_KEY: ${{ secrets.GCP_DEVELOPER_KNOWLEDGE_API_KEY }}
        run: |
          # Convert agent-test-name to dagger function name (e.g. angie-assist)
          FUNC="${{ matrix.test }}"
          ARGS=""

          # Check if this agent needs GCP credentials (.agent-gcp marker)
          for agent in $(echo '${{ needs.discover.outputs.agents }}' | jq -r '.[]'); do
            if [[ "$FUNC" == "${agent}-"* ]] && [ -f "$agent/.agent-gcp" ]; then
              ARGS="--workload-identity-provider=${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}"
              ARGS="$ARGS --service-account=${{ secrets.GCP_SERVICE_ACCOUNT }}"
              ARGS="$ARGS --project-id=${{ secrets.GCP_PROJECT_ID }}"
              ARGS="$ARGS --oidc-token=env:ACTIONS_ID_TOKEN_REQUEST_TOKEN"
              ARGS="$ARGS --oidc-url=env:ACTIONS_ID_TOKEN_REQUEST_URL"
              ARGS="$ARGS --region=europe-west9"
              if [[ -n "$GCP_DEVELOPER_KNOWLEDGE_API_KEY" ]]; then
                ARGS="$ARGS --developer-knowledge-api-key=env:GCP_DEVELOPER_KNOWLEDGE_API_KEY"
              fi
              break
            fi
          done

          OUTPUT=$(dagger call -m tests "$FUNC" $ARGS 2>&1) || { echo "$OUTPUT"; exit 1; }
          echo "$OUTPUT"

          RESULTS=$(echo "$OUTPUT" | grep -E '^\s*\[(OK|!!|--)\]|^PASS:|^FAIL:' || true)
          echo "output<<EOF" >> $GITHUB_OUTPUT
          echo "$RESULTS" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Summary
        if: always()
        run: |
          echo "## Test: ${{ matrix.test }}" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.test.outcome }}" == "success" ]; then
            echo ":white_check_mark: **PASSED**" >> $GITHUB_STEP_SUMMARY
          else
            echo ":x: **FAILED**" >> $GITHUB_STEP_SUMMARY
          fi
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat << 'ENDOFOUTPUT' >> $GITHUB_STEP_SUMMARY
          ${{ steps.test.outputs.output }}
          ENDOFOUTPUT
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Stop Dagger engine
        if: always()
        run: docker stop $(docker ps -q -f 'name=dagger-engine') 2>/dev/null || true

      - name: Save Dagger engine cache
        if: always()
        uses: BYK/docker-volume-cache-action/save@v1
        with:
          key: dagger-engine-${{ runner.os }}-v0.19.11
          volumes: dagger-engine

  test-angie-github-issue:
    needs: [validate]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Restore Dagger engine cache
        uses: BYK/docker-volume-cache-action/restore@v1
        with:
          key: dagger-engine-${{ runner.os }}-v0.19.11
          volumes: dagger-engine

      - name: Setup Dagger
        uses: dagger/dagger-for-github@v8.3.0
        with:
          version: "0.19.11"
          verb: version
          cloud-token: ${{ secrets.DAGGER_CLOUD_TOKEN }}

      - name: Test angie develop-github-issue
        id: test
        env:
          _EXPERIMENTAL_DAGGER_RUNNER_HOST: "docker-image://registry.dagger.io/engine:v0.19.11?volume=dagger-engine"
          DAGGER_CLOUD_TOKEN: ${{ secrets.DAGGER_CLOUD_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: ${{ vars.GEMINI_MODEL }}
          ANGIE_TEST_GITHUB_TOKEN: ${{ secrets.ANGIE_TEST_GITHUB_TOKEN }}
        run: |
          OUTPUT=$(dagger call -m tests angie-develop-github-issue \
            --github-token=env:ANGIE_TEST_GITHUB_TOKEN \
            2>&1) || { echo "$OUTPUT"; exit 1; }
          echo "$OUTPUT"

          RESULTS=$(echo "$OUTPUT" | grep -E '^\s*\[(OK|!!|--)\]|^PASS:|^FAIL:' || true)
          echo "output<<EOF" >> $GITHUB_OUTPUT
          echo "$RESULTS" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Cleanup test PR
        if: always()
        env:
          GH_TOKEN: ${{ secrets.ANGIE_TEST_GITHUB_TOKEN }}
        run: |
          PR_URL=$(echo "${{ steps.test.outputs.output }}" | grep -oP 'pr_url=\K[^\)]+' || true)
          if [[ -n "$PR_URL" ]]; then
            gh pr close "$PR_URL" --delete-branch || true
            echo "Closed PR and deleted branch: $PR_URL"
          fi

      - name: Summary
        if: always()
        run: |
          echo "## Test: angie-develop-github-issue" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.test.outcome }}" == "success" ]; then
            echo ":white_check_mark: **PASSED**" >> $GITHUB_STEP_SUMMARY
          else
            echo ":x: **FAILED**" >> $GITHUB_STEP_SUMMARY
          fi
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat << 'ENDOFOUTPUT' >> $GITHUB_STEP_SUMMARY
          ${{ steps.test.outputs.output }}
          ENDOFOUTPUT
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Stop Dagger engine
        if: always()
        run: docker stop $(docker ps -q -f 'name=dagger-engine') 2>/dev/null || true

      - name: Save Dagger engine cache
        if: always()
        uses: BYK/docker-volume-cache-action/save@v1
        with:
          key: dagger-engine-${{ runner.os }}-v0.19.11
          volumes: dagger-engine

  release:
    needs: [discover, test-modules, test-agents, test-angie-github-issue]
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Dagger
        uses: dagger/dagger-for-github@v8.3.0
        with:
          version: "0.19.11"
          verb: version
          cloud-token: ${{ secrets.DAGGER_CLOUD_TOKEN }}

      - name: Tag changed modules
        if: inputs.dry_run != true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Combine modules and agents for tagging
          ALL_MODULES=$(echo '${{ needs.discover.outputs.modules }}' '${{ needs.discover.outputs.agents }}' | jq -s 'add')
          for module in $(echo "$ALL_MODULES" | jq -r '.[]'); do
            LATEST_TAG=$(git tag -l "${module}/v*" --sort=-v:refname | head -n1)
            if [ -n "$LATEST_TAG" ] && git diff --quiet "$LATEST_TAG" HEAD -- "$module/"; then
              echo "No changes in $module since $LATEST_TAG"
              continue
            fi
            TAG=$(dagger call -m ./semver release --source=. --tag-prefix="${module}/" --initial-version="v0.1.0" --github-token=env:GITHUB_TOKEN)
            echo "$module: $TAG"
          done

      - name: Create release
        if: inputs.dry_run != true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git fetch --tags
          VERSION=$(dagger call -m ./calver generate --source=. --format="vYYYY.MM.MICRO")

          # Build release notes
          ALL_MODULES=$(echo '${{ needs.discover.outputs.modules }}' '${{ needs.discover.outputs.agents }}' | jq -s 'add')
          NOTES="## Module Versions\n\n"
          NOTES="$NOTES| Module | Version | Engine |\n|--------|---------|--------|"
          for module in $(echo "$ALL_MODULES" | jq -r '.[]'); do
            VER=$(dagger call -m ./semver current --source=. --tag-prefix="${module}/" --initial-version="v0.0.0")
            ENGINE=$(jq -r '.engineVersion // "unknown"' "$module/dagger.json")
            NOTES="$NOTES\n| $module | $VER | $ENGINE |"
          done

          if gh release view "$VERSION" > /dev/null 2>&1; then
            echo -e "$NOTES" | gh release edit "$VERSION" --notes-file -
          else
            echo -e "$NOTES" | gh release create "$VERSION" --title "Release $VERSION" --notes-file -
          fi
