name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run release (no tags created)'
        type: boolean
        default: false

jobs:
  discover:
    runs-on: ubuntu-latest
    outputs:
      modules: ${{ steps.find.outputs.modules }}
    steps:
      - uses: actions/checkout@v4
      - name: Find modules
        id: find
        run: |
          MODULES=$(find . -maxdepth 2 -name "dagger.json" -not -path "./tests/*" | \
            xargs -I {} dirname {} | sed 's|^\./||' | sort -u | \
            jq -R -s -c 'split("\n") | map(select(length > 0))')
          echo "modules=$MODULES" >> $GITHUB_OUTPUT

  validate:
    needs: discover
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check module structure
        run: |
          for module in $(echo '${{ needs.discover.outputs.modules }}' | jq -r '.[]'); do
            echo "Checking $module..."
            [ -f "$module/dagger.json" ] || { echo "ERROR: $module/dagger.json missing"; exit 1; }
            grep -q '"description"' "$module/dagger.json" || { echo "ERROR: $module missing description"; exit 1; }
            [ "$module" = "tests" ] && continue
            [ -f "$module/README.md" ] || { echo "ERROR: $module/README.md missing"; exit 1; }
            [ -d "$module/examples" ] || { echo "ERROR: $module/examples missing"; exit 1; }
          done

      - name: Setup Dagger
        uses: dagger/dagger-for-github@v8.2.0
        with:
          version: "0.19.8"
          verb: version
          cloud-token: ${{ secrets.DAGGER_CLOUD_TOKEN }}

      - name: Verify modules load
        run: |
          for module in $(echo '${{ needs.discover.outputs.modules }}' | jq -r '.[]'); do
            cd $module && dagger functions > /dev/null && cd ..
          done

      - name: Check all modules have tests
        run: |
          # Get test function names from the tests module (skip header line, extract first column)
          cd tests
          TEST_FUNCS=$(dagger functions 2>/dev/null | tail -n +2 | awk '{print $1}' | tr '\n' ' ')
          cd ..
          echo "Available tests: $TEST_FUNCS"

          MISSING=""
          for module in $(echo '${{ needs.discover.outputs.modules }}' | jq -r '.[]'); do
            if ! echo " $TEST_FUNCS " | grep -q " $module "; then
              MISSING="$MISSING $module"
            fi
          done

          if [ -n "$MISSING" ]; then
            echo "ERROR: Missing tests for:$MISSING"
            exit 1
          fi
          echo "All modules have tests!"

  test:
    needs: [discover, validate]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        module: ${{ fromJson(needs.discover.outputs.modules) }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # needed for semver tests

      - name: Setup test environment
        id: setup
        run: |
          MODULE="${{ matrix.module }}"

          # Module-specific args
          case "$MODULE" in
            gcp-artifact-registry)
              echo "args=--repository=${{ secrets.GCP_ARTIFACT_REGISTRY_REPOSITORY }}" >> $GITHUB_OUTPUT
              echo "needs_gcp=true" >> $GITHUB_OUTPUT
              echo "needs_gcp_auth_action=false" >> $GITHUB_OUTPUT
              ;;
            gcp-firebase)
              echo "args=" >> $GITHUB_OUTPUT
              echo "needs_gcp=false" >> $GITHUB_OUTPUT
              echo "needs_gcp_auth_action=true" >> $GITHUB_OUTPUT
              ;;
            gcp-*)
              echo "args=" >> $GITHUB_OUTPUT
              echo "needs_gcp=true" >> $GITHUB_OUTPUT
              echo "needs_gcp_auth_action=false" >> $GITHUB_OUTPUT
              ;;
            semver)
              echo "args=--source=." >> $GITHUB_OUTPUT
              echo "needs_gcp=false" >> $GITHUB_OUTPUT
              echo "needs_gcp_auth_action=false" >> $GITHUB_OUTPUT
              ;;
            *)
              echo "args=" >> $GITHUB_OUTPUT
              echo "needs_gcp=false" >> $GITHUB_OUTPUT
              echo "needs_gcp_auth_action=false" >> $GITHUB_OUTPUT
              ;;
          esac

      # Firebase needs google-github-actions/auth for proper credentials
      - name: Authenticate to GCP (Firebase)
        if: steps.setup.outputs.needs_gcp_auth_action == 'true'
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          create_credentials_file: true

      - name: Setup Dagger
        uses: dagger/dagger-for-github@v8.2.0
        with:
          version: "0.19.8"
          verb: version
          cloud-token: ${{ secrets.DAGGER_CLOUD_TOKEN }}

      - name: Test ${{ matrix.module }}
        env:
          DAGGER_CLOUD_TOKEN: ${{ secrets.DAGGER_CLOUD_TOKEN }}
        run: |
          # Build the dagger call command
          MODULE="${{ matrix.module }}"
          ARGS="${{ steps.setup.outputs.args }}"

          if [ "${{ steps.setup.outputs.needs_gcp_auth_action }}" == "true" ]; then
            # Firebase uses google-github-actions/auth credentials
            OUTPUT=$(dagger call -m tests "$MODULE" \
              --credentials="file:$GOOGLE_APPLICATION_CREDENTIALS" \
              --project-id="${{ secrets.GCP_PROJECT_ID }}" \
              $ARGS)
          elif [ "${{ steps.setup.outputs.needs_gcp }}" == "true" ]; then
            # Other GCP modules use OIDC directly
            OUTPUT=$(dagger call -m tests "$MODULE" \
              --workload-identity-provider="${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}" \
              --service-account="${{ secrets.GCP_SERVICE_ACCOUNT }}" \
              --project-id="${{ secrets.GCP_PROJECT_ID }}" \
              --oidc-token="env:ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
              --oidc-url="env:ACTIONS_ID_TOKEN_REQUEST_URL" \
              --region="europe-west9" \
              $ARGS)
          else
            OUTPUT=$(dagger call -m tests "$MODULE" $ARGS)
          fi

          # Print to logs
          echo "$OUTPUT"

          # Write to GitHub Actions summary
          echo "## $MODULE" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "$OUTPUT" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

  release:
    needs: [discover, test]
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Dagger
        uses: dagger/dagger-for-github@v8.2.0
        with:
          version: "0.19.8"
          verb: version
          cloud-token: ${{ secrets.DAGGER_CLOUD_TOKEN }}

      - name: Tag changed modules
        if: inputs.dry_run != true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          for module in $(echo '${{ needs.discover.outputs.modules }}' | jq -r '.[]'); do
            echo "Processing $module..."

            # Get latest tag for this module
            LATEST_TAG=$(git tag -l "${module}/v*" --sort=-v:refname | head -n1)

            # Skip if no changes since last tag
            if [ -n "$LATEST_TAG" ]; then
              if ! git diff --quiet "$LATEST_TAG" HEAD -- "$module/"; then
                echo "  Changes detected since $LATEST_TAG"
              else
                echo "  No changes since $LATEST_TAG, skipping"
                continue
              fi
            fi

            TAG=$(dagger call -m ./semver release \
              --source=. \
              --tag-prefix="${module}/" \
              --initial-version="v0.1.0" \
              --github-token=env:GITHUB_TOKEN)
            echo "  Result: $TAG"
          done

      - name: Create release
        if: inputs.dry_run != true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Fetch tags created by the previous step
          git fetch --tags

          VERSION=$(dagger call -m ./calver generate --source=. --format="vYYYY.MM.MICRO")

          # Build release notes
          NOTES="## Module Versions\n\n| Module | Version |\n|--------|---------|"
          for module in $(echo '${{ needs.discover.outputs.modules }}' | jq -r '.[]'); do
            VER=$(dagger call -m ./semver current --source=. --tag-prefix="${module}/" --initial-version="v0.0.0")
            NOTES="$NOTES\n| $module | $VER |"
          done

          if gh release view "$VERSION" > /dev/null 2>&1; then
            echo -e "$NOTES" | gh release edit "$VERSION" --notes-file -
          else
            echo -e "$NOTES" | gh release create "$VERSION" --title "Release $VERSION" --notes-file -
          fi
