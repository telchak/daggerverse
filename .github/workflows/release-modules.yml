name: Release Modules

on:
  workflow_run:
    workflows: ["Test Modules"]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (no tags/releases created)'
        required: false
        default: false
        type: boolean

env:
  SEMVER_MODULE: "./semver"
  CALVER_MODULE: "./calver"

jobs:
  check-workflows:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    permissions:
      contents: read
      actions: read
    outputs:
      should_release: ${{ steps.check.outputs.should_release }}
      modules: ${{ steps.discover.outputs.modules }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Discover modules
        id: discover
        run: |
          # Find all dagger.json in root directories (exclude tests and nested examples)
          MODULES=$(find . -maxdepth 2 -name "dagger.json" -not -path "./tests/*" | \
            xargs -I {} dirname {} | \
            sed 's|^\./||' | \
            sort -u | \
            jq -R -s -c 'split("\n") | map(select(length > 0))')

          echo "Discovered modules: $MODULES"
          echo "modules=$MODULES" >> $GITHUB_OUTPUT

      - name: Check if all required workflows passed
        id: check
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "Manual trigger - proceeding with release"
            echo "should_release=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          COMMIT_SHA="${{ github.event.workflow_run.head_sha }}"
          echo "Checking workflows for commit: $COMMIT_SHA"

          VALIDATE_STATUS=$(gh api \
            -H "Accept: application/vnd.github+json" \
            "/repos/${{ github.repository }}/actions/workflows/validate-modules.yml/runs?head_sha=$COMMIT_SHA&status=success&per_page=1" \
            --jq '.workflow_runs | length')

          if [ "$VALIDATE_STATUS" = "0" ]; then
            echo "Validate Modules has not succeeded for this commit yet"
            echo "should_release=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "Both Validate Modules and Test Modules succeeded!"
          echo "should_release=true" >> $GITHUB_OUTPUT

  tag-modules:
    needs: check-workflows
    if: ${{ needs.check-workflows.outputs.should_release == 'true' && needs.check-workflows.outputs.modules != '[]' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        module: ${{ fromJson(needs.check-workflows.outputs.modules) }}
    outputs:
      # Use a workaround to collect outputs from matrix jobs
      results: ${{ steps.collect.outputs.results }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Setup Dagger
        uses: dagger/dagger-for-github@v8.2.0
        with:
          version: "0.19.8"
          verb: version
          cloud-token: ${{ secrets.DAGGER_CLOUD_TOKEN }}

      - name: Tag module ${{ matrix.module }}
        id: tag
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DRY_RUN: ${{ inputs.dry_run || 'false' }}
        run: |
          MODULE="${{ matrix.module }}"
          TAG_PREFIX="${MODULE}/"

          echo "Processing $MODULE..."

          # Get current version
          CURRENT=$(dagger call -m ${{ env.SEMVER_MODULE }} current \
            --source=. \
            --tag-prefix="$TAG_PREFIX" \
            --initial-version="v0.0.0")

          echo "Current version: $CURRENT"

          # Check if there are changes
          if [ "$CURRENT" = "v0.0.0" ]; then
            echo "No existing tags - will create initial release"
            NEEDS_TAG="true"
          else
            CHANGED_PATHS=$(dagger call -m ${{ env.SEMVER_MODULE }} changed-paths \
              --source=. \
              --tag-prefix="$TAG_PREFIX")

            if echo "$CHANGED_PATHS" | grep -q "^${MODULE}/"; then
              echo "Changes detected in $MODULE"
              NEEDS_TAG="true"
            else
              echo "No changes in $MODULE since $CURRENT"
              NEEDS_TAG="false"
            fi
          fi

          if [ "$NEEDS_TAG" = "true" ]; then
            # Calculate next version
            NEXT=$(dagger call -m ${{ env.SEMVER_MODULE }} next \
              --source=. \
              --tag-prefix="$TAG_PREFIX" \
              --initial-version="v0.1.0")

            echo "Next version: $NEXT"

            if [ "$DRY_RUN" = "true" ]; then
              echo "[DRY RUN] Would create tag: ${TAG_PREFIX}${NEXT}"
              RESULT="dry-run:${MODULE}:${NEXT}"
            else
              # Create and push tag using semver module
              TAG_RESULT=$(dagger call -m ${{ env.SEMVER_MODULE }} release \
                --source=. \
                --tag-prefix="$TAG_PREFIX" \
                --initial-version="v0.1.0" \
                --github-token=env:GITHUB_TOKEN)

              echo "Tag result: $TAG_RESULT"

              if echo "$TAG_RESULT" | grep -q "already"; then
                RESULT="skipped:${MODULE}:${CURRENT}"
              else
                RESULT="tagged:${MODULE}:${NEXT}"
              fi
            fi
          else
            RESULT="unchanged:${MODULE}:${CURRENT}"
          fi

          echo "result=$RESULT" >> $GITHUB_OUTPUT
          echo "Module $MODULE result: $RESULT"

      - name: Collect results
        id: collect
        run: |
          echo "results=${{ steps.tag.outputs.result }}" >> $GITHUB_OUTPUT

  aggregate-results:
    needs: [check-workflows, tag-modules]
    if: always() && needs.check-workflows.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    outputs:
      tagged_modules: ${{ steps.aggregate.outputs.tagged_modules }}
      all_versions: ${{ steps.aggregate.outputs.all_versions }}
      has_changes: ${{ steps.aggregate.outputs.has_changes }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Setup Dagger
        uses: dagger/dagger-for-github@v8.2.0
        with:
          version: "0.19.8"
          verb: version
          cloud-token: ${{ secrets.DAGGER_CLOUD_TOKEN }}

      - name: Aggregate module versions
        id: aggregate
        run: |
          # Discover all modules and get their current versions from tags
          MODULES=$(find . -maxdepth 2 -name "dagger.json" -not -path "./tests/*" | \
            xargs -I {} dirname {} | \
            sed 's|^\./||' | \
            sort -u)

          TAGGED_MODULES=""
          ALL_VERSIONS=""
          HAS_CHANGES="false"

          for MODULE in $MODULES; do
            TAG_PREFIX="${MODULE}/"

            # Get current version from tags (after tagging)
            VERSION=$(dagger call -m ./semver current \
              --source=. \
              --tag-prefix="$TAG_PREFIX" \
              --initial-version="v0.0.0")

            ALL_VERSIONS="${ALL_VERSIONS}|${MODULE}:${VERSION}"

            # Check if this module was just tagged (tag points to HEAD)
            HEAD_TAG=$(git tag --points-at HEAD | grep "^${MODULE}/v" | head -n 1 || true)
            if [ -n "$HEAD_TAG" ]; then
              TAGGED_MODULES="${TAGGED_MODULES} ${MODULE}:${VERSION}"
              HAS_CHANGES="true"
            fi
          done

          # Clean up
          ALL_VERSIONS=$(echo "$ALL_VERSIONS" | sed 's/^|//')
          TAGGED_MODULES=$(echo "$TAGGED_MODULES" | xargs)

          echo "Tagged modules: $TAGGED_MODULES"
          echo "All versions: $ALL_VERSIONS"
          echo "Has changes: $HAS_CHANGES"

          echo "tagged_modules=$TAGGED_MODULES" >> $GITHUB_OUTPUT
          echo "all_versions=$ALL_VERSIONS" >> $GITHUB_OUTPUT
          echo "has_changes=$HAS_CHANGES" >> $GITHUB_OUTPUT

  create-release:
    needs: aggregate-results
    if: ${{ needs.aggregate-results.outputs.has_changes == 'true' && inputs.dry_run != true }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Setup Dagger
        uses: dagger/dagger-for-github@v8.2.0
        with:
          version: "0.19.8"
          verb: version
          cloud-token: ${{ secrets.DAGGER_CLOUD_TOKEN }}

      - name: Calculate calver version
        id: calver
        run: |
          VERSION=$(dagger call -m ${{ env.CALVER_MODULE }} version --source=.)
          echo "Calver version: $VERSION"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Generate release notes
        id: notes
        run: |
          ALL_VERSIONS="${{ needs.aggregate-results.outputs.all_versions }}"
          TAGGED="${{ needs.aggregate-results.outputs.tagged_modules }}"

          # Create release notes
          cat > /tmp/release-notes.md << 'EOF'
          ## Module Versions

          Install any module with:
          ```bash
          dagger install github.com/${{ github.repository }}/<module>@<version>
          ```

          | Module | Version | Status |
          |--------|---------|--------|
          EOF

          # Parse all versions and add to table
          echo "$ALL_VERSIONS" | tr '|' '\n' | while read -r entry; do
            if [ -n "$entry" ]; then
              MODULE=$(echo "$entry" | cut -d: -f1)
              VERSION=$(echo "$entry" | cut -d: -f2)

              # Check if this module was tagged in this release
              if echo "$TAGGED" | grep -q "$MODULE:"; then
                STATUS="**Updated**"
              else
                STATUS="Unchanged"
              fi

              echo "| \`$MODULE\` | \`$VERSION\` | $STATUS |" >> /tmp/release-notes.md
            fi
          done

          echo "" >> /tmp/release-notes.md
          echo "---" >> /tmp/release-notes.md
          echo "" >> /tmp/release-notes.md
          echo "_Release automatically generated from commit ${{ github.event.workflow_run.head_sha || github.sha }}_" >> /tmp/release-notes.md

          cat /tmp/release-notes.md

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.calver.outputs.version }}"

          # Check if release already exists
          if gh release view "$VERSION" > /dev/null 2>&1; then
            echo "Release $VERSION already exists, updating..."
            gh release edit "$VERSION" \
              --title "Release $VERSION" \
              --notes-file /tmp/release-notes.md
          else
            echo "Creating release $VERSION..."
            gh release create "$VERSION" \
              --title "Release $VERSION" \
              --notes-file /tmp/release-notes.md \
              --target ${{ github.event.workflow_run.head_sha || github.sha }}
          fi

          echo "Release created/updated: $VERSION"

  summary:
    needs: [tag-modules, aggregate-results, create-release]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Summary
        run: |
          echo "## Release Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "${{ needs.aggregate-results.outputs.has_changes }}" = "true" ]; then
            echo "### Tagged Modules" >> $GITHUB_STEP_SUMMARY
            echo "${{ needs.aggregate-results.outputs.tagged_modules }}" | tr ' ' '\n' | while read -r entry; do
              if [ -n "$entry" ]; then
                echo "- \`$entry\`" >> $GITHUB_STEP_SUMMARY
              fi
            done
          else
            echo "No modules needed tagging." >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### All Module Versions" >> $GITHUB_STEP_SUMMARY
          echo "${{ needs.aggregate-results.outputs.all_versions }}" | tr '|' '\n' | while read -r entry; do
            if [ -n "$entry" ]; then
              echo "- \`$entry\`" >> $GITHUB_STEP_SUMMARY
            fi
          done
