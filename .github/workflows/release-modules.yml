name: Release Modules

on:
  workflow_run:
    workflows: ["Test Modules"]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (no tags/releases created)'
        required: false
        default: false
        type: boolean

env:
  SEMVER_MODULE: "./semver"
  GITHUB_MODULE: "github.com/jumppad-labs/daggerverse/github"

jobs:
  check-workflows:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    outputs:
      should_release: ${{ steps.check.outputs.should_release }}
      modules: ${{ steps.discover.outputs.modules }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Discover modules
        id: discover
        run: |
          # Find all dagger.json in root directories (exclude tests and nested examples)
          MODULES=$(find . -maxdepth 2 -name "dagger.json" -not -path "./tests/*" | \
            xargs -I {} dirname {} | \
            sed 's|^\./||' | \
            sort -u | \
            jq -R -s -c 'split("\n") | map(select(length > 0))')

          echo "Discovered modules: $MODULES"
          echo "modules=$MODULES" >> $GITHUB_OUTPUT

      - name: Check if all required workflows passed
        id: check
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "Manual trigger - proceeding with release"
            echo "should_release=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          COMMIT_SHA="${{ github.event.workflow_run.head_sha }}"
          echo "Checking workflows for commit: $COMMIT_SHA"

          VALIDATE_STATUS=$(gh api \
            -H "Accept: application/vnd.github+json" \
            "/repos/${{ github.repository }}/actions/workflows/validate-modules.yml/runs?head_sha=$COMMIT_SHA&status=success&per_page=1" \
            --jq '.workflow_runs | length')

          if [ "$VALIDATE_STATUS" = "0" ]; then
            echo "Validate Modules has not succeeded for this commit yet"
            echo "should_release=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "Both Validate Modules and Test Modules succeeded!"
          echo "should_release=true" >> $GITHUB_OUTPUT

  release:
    needs: check-workflows
    if: ${{ needs.check-workflows.outputs.should_release == 'true' && needs.check-workflows.outputs.modules != '[]' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        module: ${{ fromJson(needs.check-workflows.outputs.modules) }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Setup Dagger
        uses: dagger/dagger-for-github@v8.2.0
        with:
          version: "0.19.8"
          verb: version
          cloud-token: ${{ secrets.DAGGER_CLOUD_TOKEN }}

      - name: Check for changes and get current version
        id: check-changes
        run: |
          MODULE="${{ matrix.module }}"
          TAG_PREFIX="${MODULE}/"

          echo "Checking $MODULE for changes..."

          # Get current version using semver module
          CURRENT=$(dagger call -m ${{ env.SEMVER_MODULE }} current \
            --source=. \
            --tag-prefix="$TAG_PREFIX" \
            --initial-version="0.0.0")
          echo "current_version=$CURRENT" >> $GITHUB_OUTPUT

          # Check if there are changes since last tag
          if [ "$CURRENT" = "v0.0.0" ]; then
            echo "No existing tags - will create initial release"
            echo "has_changes=true" >> $GITHUB_OUTPUT
          else
            CHANGED_PATHS=$(dagger call -m ${{ env.SEMVER_MODULE }} changed-paths \
              --source=. \
              --tag-prefix="$TAG_PREFIX")

            # Check if any changes are in this module's directory
            if echo "$CHANGED_PATHS" | grep -q "^${MODULE}/"; then
              echo "Changes detected in $MODULE"
              echo "has_changes=true" >> $GITHUB_OUTPUT
            else
              echo "No changes in $MODULE since $CURRENT"
              echo "has_changes=false" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Calculate next version
        id: next-version
        if: steps.check-changes.outputs.has_changes == 'true'
        run: |
          MODULE="${{ matrix.module }}"
          TAG_PREFIX="${MODULE}/"

          NEXT=$(dagger call -m ${{ env.SEMVER_MODULE }} next \
            --source=. \
            --tag-prefix="$TAG_PREFIX" \
            --initial-version="0.1.0")

          echo "Next version for $MODULE: $NEXT"
          echo "next_version=$NEXT" >> $GITHUB_OUTPUT
          echo "tag=${TAG_PREFIX}${NEXT}" >> $GITHUB_OUTPUT

      - name: Create and push tag
        id: create-tag
        if: steps.check-changes.outputs.has_changes == 'true' && inputs.dry_run != true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          MODULE="${{ matrix.module }}"
          TAG_PREFIX="${MODULE}/"

          RESULT=$(dagger call -m ${{ env.SEMVER_MODULE }} release \
            --source=. \
            --tag-prefix="$TAG_PREFIX" \
            --initial-version="0.1.0" \
            --github-token=env:GITHUB_TOKEN)

          echo "Release result: $RESULT"
          echo "result=$RESULT" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        if: steps.check-changes.outputs.has_changes == 'true' && inputs.dry_run != true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          MODULE="${{ matrix.module }}"
          TAG="${{ steps.next-version.outputs.tag }}"
          VERSION="${{ steps.next-version.outputs.next_version }}"
          OWNER="${{ github.repository_owner }}"
          REPO="${{ github.event.repository.name }}"
          SHA="${{ github.event.workflow_run.head_sha || github.sha }}"

          # Create empty directory for release (no assets)
          mkdir -p /tmp/release-assets

          dagger call -m ${{ env.GITHUB_MODULE }} \
            --token=env:GITHUB_TOKEN \
            create-release \
            --owner="$OWNER" \
            --repo="$REPO" \
            --tag="$TAG" \
            --sha="$SHA" \
            --files=/tmp/release-assets

          echo "Created GitHub release: $TAG"

      - name: Dry run summary
        if: steps.check-changes.outputs.has_changes == 'true' && inputs.dry_run == true
        run: |
          echo "[DRY RUN] Would release ${{ matrix.module }} ${{ steps.next-version.outputs.next_version }}"
          echo "Tag: ${{ steps.next-version.outputs.tag }}"

      - name: Skip summary
        if: steps.check-changes.outputs.has_changes != 'true'
        run: |
          echo "Skipping ${{ matrix.module }} - no changes since ${{ steps.check-changes.outputs.current_version }}"
