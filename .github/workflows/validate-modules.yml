name: Validate Modules

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check module structure
        run: |
          MODULES="calver gcp-auth gcp-artifact-registry gcp-cloud-run gcp-vertex-ai gcp-firebase health-check oidc semver tests"
          ERRORS=0

          for module in $MODULES; do
            echo "Checking $module..."

            # Check dagger.json exists
            if [ ! -f "$module/dagger.json" ]; then
              echo "  ERROR: $module/dagger.json not found"
              ERRORS=$((ERRORS + 1))
            fi

            # Check dagger.json has description
            if [ -f "$module/dagger.json" ]; then
              if ! grep -q '"description"' "$module/dagger.json"; then
                echo "  ERROR: $module/dagger.json missing 'description' field"
                ERRORS=$((ERRORS + 1))
              fi
            fi

            # Skip tests module for README and examples checks
            if [ "$module" = "tests" ]; then
              echo "  Skipping additional checks for tests module"
              continue
            fi

            # Check README.md exists
            if [ ! -f "$module/README.md" ]; then
              echo "  ERROR: $module/README.md not found"
              ERRORS=$((ERRORS + 1))
            fi

            # Check all .py files are under 300 lines (warning only)
            for py_file in $(find "$module/src" -name "*.py" 2>/dev/null); do
              LINES=$(wc -l < "$py_file")
              if [ "$LINES" -gt 300 ]; then
                echo "::warning file=$py_file::File has $LINES lines (recommended max 300)"
                echo "  WARNING: $py_file has $LINES lines (max 300)"
              else
                echo "  OK: $py_file has $LINES lines"
              fi
            done

            # Check examples directory exists
            if [ ! -d "$module/examples" ]; then
              echo "  ERROR: $module/examples not found"
              ERRORS=$((ERRORS + 1))
            fi
          done

          if [ $ERRORS -gt 0 ]; then
            echo ""
            echo "Found $ERRORS error(s)!"
            exit 1
          fi
          echo ""
          echo "All modules validated successfully!"

      - name: Check function docstrings
        run: |
          echo "Checking function docstrings..."
          WARNINGS=0

          for py_file in $(find . -path "./*/src/*" -name "main.py" ! -path "./.git/*"); do
            echo "Checking $py_file..."

            # Find @function decorators not followed by a docstring
            # This checks if a def line after @function has a docstring on the next non-empty line
            python3 << EOF
          import re
          import sys

          with open("$py_file") as f:
              content = f.read()

          # Pattern: @function decorator followed by def, check for docstring
          pattern = r'@function\s*\n\s*(async\s+)?def\s+(\w+)\([^)]*\)[^:]*:\s*\n(\s*"""|\s*[^"\s])'

          issues = []
          for match in re.finditer(pattern, content):
              func_name = match.group(2)
              has_docstring = match.group(3).strip().startswith('"""')
              if not has_docstring and not func_name.startswith('_'):
                  issues.append(func_name)

          if issues:
              for func in issues:
                  print(f"  WARNING: Function '{func}' missing docstring")
              sys.exit(1)
          else:
              print("  OK: All public functions have docstrings")
          EOF

            if [ $? -ne 0 ]; then
              WARNINGS=$((WARNINGS + 1))
            fi
          done

          if [ $WARNINGS -gt 0 ]; then
            echo ""
            echo "::warning::Found $WARNINGS file(s) with missing function docstrings"
          fi

      - name: Check for emojis in code
        run: |
          # Check for common emojis in Python source files (not README)
          if grep -rE '✓|✅|❌|⚠️|🎯|📦|🚀|💡|🔗|📝|🌟|📋|📚|🏗️|🔄|🧪|🤝|📖' \
              --include="*.py" \
              --exclude-dir=".git" \
              calver gcp-auth gcp-artifact-registry gcp-cloud-run gcp-vertex-ai gcp-firebase health-check oidc semver tests 2>/dev/null; then
            echo "WARNING: Found emojis in Python source files"
            echo "Consider removing emojis for cleaner output"
          else
            echo "No emojis found in Python source files"
          fi

      - name: Setup Dagger
        uses: dagger/dagger-for-github@v8.2.0
        with:
          version: "0.19.8"
          verb: version

      - name: Validate dagger modules load correctly
        run: |
          MODULES="calver gcp-auth gcp-artifact-registry gcp-cloud-run gcp-vertex-ai gcp-firebase health-check oidc semver tests"

          for module in $MODULES; do
            echo "Validating $module module..."
            cd $module
            dagger functions > /dev/null 2>&1 || {
              echo "ERROR: Failed to load $module module"
              exit 1
            }
            echo "  OK: $module loads correctly"
            cd ..
          done
          echo "All modules load correctly!"

      - name: Validate example modules load correctly
        run: |
          echo "Validating example modules..."
          EXAMPLES=$(find . -path "*/examples/python/dagger.json" ! -path "./.git/*" | xargs -I {} dirname {})

          for example_dir in $EXAMPLES; do
            echo "Validating $example_dir..."
            cd "$example_dir"
            dagger functions > /dev/null 2>&1 || {
              echo "ERROR: Failed to load example module in $example_dir"
              exit 1
            }
            echo "  OK: $example_dir loads correctly"
            cd - > /dev/null
          done
          echo "All example modules load correctly!"
