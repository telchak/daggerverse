name: Test Modules

on:
  push:
    branches: [main]
    paths:
      - 'calver/**'
      - 'gcp-auth/**'
      - 'gcp-artifact-registry/**'
      - 'gcp-cloud-run/**'
      - 'gcp-vertex-ai/**'
      - 'gcp-firebase/**'
      - 'health-check/**'
      - 'oidc/**'
      - 'tests/**'
  pull_request:
    branches: [main]
    paths:
      - 'calver/**'
      - 'gcp-auth/**'
      - 'gcp-artifact-registry/**'
      - 'gcp-cloud-run/**'
      - 'gcp-vertex-ai/**'
      - 'gcp-firebase/**'
      - 'health-check/**'
      - 'oidc/**'
      - 'tests/**'

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      calver: ${{ steps.filter.outputs.calver }}
      gcp-auth: ${{ steps.filter.outputs.gcp-auth }}
      gcp-artifact-registry: ${{ steps.filter.outputs.gcp-artifact-registry }}
      gcp-cloud-run: ${{ steps.filter.outputs.gcp-cloud-run }}
      gcp-vertex-ai: ${{ steps.filter.outputs.gcp-vertex-ai }}
      gcp-firebase: ${{ steps.filter.outputs.gcp-firebase }}
      health-check: ${{ steps.filter.outputs.health-check }}
      oidc: ${{ steps.filter.outputs.oidc }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            calver:
              - 'calver/**'
              - 'tests/**'
            gcp-auth:
              - 'gcp-auth/**'
              - 'tests/**'
            gcp-artifact-registry:
              - 'gcp-artifact-registry/**'
              - 'tests/**'
            gcp-cloud-run:
              - 'gcp-cloud-run/**'
              - 'tests/**'
            gcp-vertex-ai:
              - 'gcp-vertex-ai/**'
              - 'tests/**'
            gcp-firebase:
              - 'gcp-firebase/**'
              - 'tests/**'
            health-check:
              - 'health-check/**'
              - 'tests/**'
            oidc:
              - 'oidc/**'
              - 'tests/**'

  # Tests that don't require credentials
  test-calver:
    needs: detect-changes
    if: needs.detect-changes.outputs.calver == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run calver tests
        uses: dagger/dagger-for-github@v8.2.0
        with:
          version: "0.19.8"
          module: tests
          call: calver
          cloud-token: ${{ secrets.DAGGER_CLOUD_TOKEN }}

  test-health-check:
    needs: detect-changes
    if: needs.detect-changes.outputs.health-check == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run health-check tests
        uses: dagger/dagger-for-github@v8.2.0
        with:
          version: "0.19.8"
          module: tests
          call: health-check
          cloud-token: ${{ secrets.DAGGER_CLOUD_TOKEN }}

  # Tests that require GCP credentials
  test-gcp-auth:
    needs: detect-changes
    if: needs.detect-changes.outputs.gcp-auth == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          create_credentials_file: true
      - name: Run gcp-auth tests
        uses: dagger/dagger-for-github@v8.2.0
        with:
          version: "0.19.8"
          module: tests
          call: gcp-auth --credentials=file:${{ env.GOOGLE_APPLICATION_CREDENTIALS }} --project-id=${{ secrets.GCP_PROJECT_ID }}
          cloud-token: ${{ secrets.DAGGER_CLOUD_TOKEN }}

  test-gcp-artifact-registry:
    needs: [detect-changes, test-gcp-auth]
    if: |
      always() &&
      needs.detect-changes.outputs.gcp-artifact-registry == 'true' &&
      (needs.test-gcp-auth.result == 'success' || needs.test-gcp-auth.result == 'skipped')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          create_credentials_file: true
      - name: Run gcp-artifact-registry tests
        uses: dagger/dagger-for-github@v8.2.0
        with:
          version: "0.19.8"
          module: tests
          call: gcp-artifact-registry --credentials=file:${{ env.GOOGLE_APPLICATION_CREDENTIALS }} --project-id=${{ secrets.GCP_PROJECT_ID }} --repository=${{ secrets.GCP_ARTIFACT_REGISTRY_REPOSITORY }}
          cloud-token: ${{ secrets.DAGGER_CLOUD_TOKEN }}

  test-gcp-cloud-run:
    needs: [detect-changes, test-gcp-auth]
    if: |
      always() &&
      needs.detect-changes.outputs.gcp-cloud-run == 'true' &&
      (needs.test-gcp-auth.result == 'success' || needs.test-gcp-auth.result == 'skipped')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          create_credentials_file: true
      - name: Run gcp-cloud-run tests
        if: ${{ vars.GCP_CLOUD_RUN_SERVICE != '' }}
        uses: dagger/dagger-for-github@v8.2.0
        with:
          version: "0.19.8"
          module: tests
          call: gcp-cloud-run --credentials=file:${{ env.GOOGLE_APPLICATION_CREDENTIALS }} --project-id=${{ secrets.GCP_PROJECT_ID }} --service-name=${{ vars.GCP_CLOUD_RUN_SERVICE }}
          cloud-token: ${{ secrets.DAGGER_CLOUD_TOKEN }}

  test-gcp-vertex-ai:
    needs: [detect-changes, test-gcp-auth]
    if: |
      always() &&
      needs.detect-changes.outputs.gcp-vertex-ai == 'true' &&
      (needs.test-gcp-auth.result == 'success' || needs.test-gcp-auth.result == 'skipped')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          create_credentials_file: true
      - name: Run gcp-vertex-ai tests
        uses: dagger/dagger-for-github@v8.2.0
        with:
          version: "0.19.8"
          module: tests
          call: gcp-vertex-ai --credentials=file:${{ env.GOOGLE_APPLICATION_CREDENTIALS }} --project-id=${{ secrets.GCP_PROJECT_ID }}
          cloud-token: ${{ secrets.DAGGER_CLOUD_TOKEN }}

  test-gcp-firebase:
    needs: [detect-changes, test-gcp-auth]
    if: |
      always() &&
      needs.detect-changes.outputs.gcp-firebase == 'true' &&
      (needs.test-gcp-auth.result == 'success' || needs.test-gcp-auth.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create test app
        run: |
          mkdir -p /tmp/test-app
          echo '{"name": "test-app", "scripts": {"build": "mkdir -p dist && echo test > dist/index.html"}}' > /tmp/test-app/package.json
      - name: Run gcp-firebase tests
        uses: dagger/dagger-for-github@v8.2.0
        with:
          version: "0.19.8"
          module: tests
          call: gcp-firebase --source=/tmp/test-app
          cloud-token: ${{ secrets.DAGGER_CLOUD_TOKEN }}

  # Summary job
  test-summary:
    needs:
      - test-calver
      - test-health-check
      - test-gcp-auth
      - test-gcp-artifact-registry
      - test-gcp-cloud-run
      - test-gcp-vertex-ai
      - test-gcp-firebase
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Check test results
        run: |
          echo "Test Results:"
          echo "  calver: ${{ needs.test-calver.result }}"
          echo "  health-check: ${{ needs.test-health-check.result }}"
          echo "  gcp-auth: ${{ needs.test-gcp-auth.result }}"
          echo "  gcp-artifact-registry: ${{ needs.test-gcp-artifact-registry.result }}"
          echo "  gcp-cloud-run: ${{ needs.test-gcp-cloud-run.result }}"
          echo "  gcp-vertex-ai: ${{ needs.test-gcp-vertex-ai.result }}"
          echo "  gcp-firebase: ${{ needs.test-gcp-firebase.result }}"

          if [[ "${{ needs.test-calver.result }}" == "failure" ]] || \
             [[ "${{ needs.test-health-check.result }}" == "failure" ]] || \
             [[ "${{ needs.test-gcp-auth.result }}" == "failure" ]] || \
             [[ "${{ needs.test-gcp-artifact-registry.result }}" == "failure" ]] || \
             [[ "${{ needs.test-gcp-cloud-run.result }}" == "failure" ]] || \
             [[ "${{ needs.test-gcp-vertex-ai.result }}" == "failure" ]] || \
             [[ "${{ needs.test-gcp-firebase.result }}" == "failure" ]]; then
            echo "One or more tests failed!"
            exit 1
          fi
          echo "All tests passed!"
