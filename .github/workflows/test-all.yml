name: Test All Modules

on:
  workflow_dispatch:
    inputs:
      skip_gcp_tests:
        description: 'Skip GCP tests (requires credentials)'
        required: false
        default: 'false'
        type: boolean

jobs:
  # Tests without credentials
  test-no-credentials:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module: [calver, health-check]
    steps:
      - uses: actions/checkout@v4
      - name: Run ${{ matrix.module }} tests
        uses: dagger/dagger-for-github@v8.2.0
        with:
          version: "0.19.8"
          module: tests
          call: ${{ matrix.module }}
          cloud-token: ${{ secrets.DAGGER_CLOUD_TOKEN }}

  # Tests with GCP credentials
  test-gcp-auth:
    if: inputs.skip_gcp_tests != true
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          create_credentials_file: true
      - name: Run gcp-auth tests
        uses: dagger/dagger-for-github@v8.2.0
        with:
          version: "0.19.8"
          module: tests
          call: gcp-auth --credentials=file:${{ env.GOOGLE_APPLICATION_CREDENTIALS }} --project-id=${{ secrets.GCP_PROJECT_ID }}
          cloud-token: ${{ secrets.DAGGER_CLOUD_TOKEN }}

  test-gcp-vertex-ai:
    if: inputs.skip_gcp_tests != true
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          create_credentials_file: true
      - name: Run gcp-vertex-ai tests
        uses: dagger/dagger-for-github@v8.2.0
        with:
          version: "0.19.8"
          module: tests
          call: gcp-vertex-ai --credentials=file:${{ env.GOOGLE_APPLICATION_CREDENTIALS }} --project-id=${{ secrets.GCP_PROJECT_ID }}
          cloud-token: ${{ secrets.DAGGER_CLOUD_TOKEN }}

  test-gcp-artifact-registry:
    if: inputs.skip_gcp_tests != true
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          create_credentials_file: true
      - name: Run gcp-artifact-registry tests
        uses: dagger/dagger-for-github@v8.2.0
        with:
          version: "0.19.8"
          module: tests
          call: gcp-artifact-registry --credentials=file:${{ env.GOOGLE_APPLICATION_CREDENTIALS }} --project-id=${{ secrets.GCP_PROJECT_ID }} --repository=${{ secrets.GCP_ARTIFACT_REGISTRY_REPOSITORY }}
          cloud-token: ${{ secrets.DAGGER_CLOUD_TOKEN }}

  test-gcp-cloud-run:
    if: inputs.skip_gcp_tests != true
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          create_credentials_file: true
      - name: Run gcp-cloud-run tests
        uses: dagger/dagger-for-github@v8.2.0
        if: ${{ secrets.GCP_CLOUD_RUN_SERVICE != '' }}
        with:
          version: "0.19.8"
          module: tests
          call: gcp-cloud-run --credentials=file:${{ env.GOOGLE_APPLICATION_CREDENTIALS }} --project-id=${{ secrets.GCP_PROJECT_ID }} --service-name=${{ secrets.GCP_CLOUD_RUN_SERVICE }}
          cloud-token: ${{ secrets.DAGGER_CLOUD_TOKEN }}

  test-gcp-firebase:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create test app
        run: |
          mkdir -p /tmp/test-app
          echo '{"name": "test-app", "scripts": {"build": "mkdir -p dist && echo test > dist/index.html"}}' > /tmp/test-app/package.json
      - name: Run gcp-firebase tests
        uses: dagger/dagger-for-github@v8.2.0
        with:
          version: "0.19.8"
          module: tests
          call: gcp-firebase --source=/tmp/test-app
          cloud-token: ${{ secrets.DAGGER_CLOUD_TOKEN }}
