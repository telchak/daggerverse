name: Publish Module

on:
  workflow_dispatch:
    inputs:
      module:
        description: 'Module to publish'
        required: true
        type: choice
        options:
          - calver
          - gcp-auth
          - gcp-artifact-registry
          - gcp-cloud-run
          - gcp-vertex-ai
          - gcp-firebase
          - health-check
          - oidc
          - semver
      version_type:
        description: 'Version bump type'
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
      version_override:
        description: 'Override version (e.g., 1.2.3) - leave empty for auto-increment'
        required: false
        type: string

env:
  SEMVER_MODULE: "./semver"
  GITHUB_MODULE: "github.com/jumppad-labs/daggerverse/github"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Dagger
        uses: dagger/dagger-for-github@v8.2.0
        with:
          version: "0.19.8"
          verb: version
          cloud-token: ${{ secrets.DAGGER_CLOUD_TOKEN }}

      - name: Validate module loads
        run: |
          MODULE="${{ inputs.module }}"
          echo "Validating module: $MODULE"
          dagger call -m "./${MODULE}" --help > /dev/null
          echo "Module validated successfully"

      - name: Calculate next version
        id: version
        run: |
          MODULE="${{ inputs.module }}"
          TAG_PREFIX="${MODULE}/"
          VERSION_TYPE="${{ inputs.version_type }}"
          VERSION_OVERRIDE="${{ inputs.version_override }}"

          if [ -n "$VERSION_OVERRIDE" ]; then
            # Use override version directly
            NEXT_VERSION="v${VERSION_OVERRIDE#v}"
            echo "Using override version: $NEXT_VERSION"
          else
            # Use semver module to calculate next version with explicit bump type
            NEXT_VERSION=$(dagger call -m ${{ env.SEMVER_MODULE }} bump \
              --source=. \
              --bump-type="$VERSION_TYPE" \
              --tag-prefix="$TAG_PREFIX" \
              --initial-version="0.1.0")
            echo "Calculated next version: $NEXT_VERSION"
          fi

          TAG_NAME="${TAG_PREFIX}${NEXT_VERSION}"
          echo "Tag name: $TAG_NAME"

          echo "version=$NEXT_VERSION" >> $GITHUB_OUTPUT
          echo "tag=$TAG_NAME" >> $GITHUB_OUTPUT

      - name: Create and push tag
        id: create-tag
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          MODULE="${{ inputs.module }}"
          TAG_PREFIX="${MODULE}/"
          VERSION="${{ steps.version.outputs.version }}"

          RESULT=$(dagger call -m ${{ env.SEMVER_MODULE }} tag \
            --source=. \
            --version="$VERSION" \
            --tag-prefix="$TAG_PREFIX" \
            --github-token=env:GITHUB_TOKEN)

          echo "Tag result: $RESULT"

          if echo "$RESULT" | grep -q "already exists"; then
            echo "ERROR: Tag already exists"
            exit 1
          fi

          echo "result=$RESULT" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          MODULE="${{ inputs.module }}"
          TAG="${{ steps.version.outputs.tag }}"
          VERSION="${{ steps.version.outputs.version }}"
          OWNER="${{ github.repository_owner }}"
          REPO="${{ github.event.repository.name }}"
          SHA="${{ github.sha }}"

          # Create empty directory for release (no assets)
          mkdir -p /tmp/release-assets

          dagger call -m ${{ env.GITHUB_MODULE }} \
            --token=env:GITHUB_TOKEN \
            create-release \
            --owner="$OWNER" \
            --repo="$REPO" \
            --tag="$TAG" \
            --sha="$SHA" \
            --files=/tmp/release-assets

          echo "Created GitHub release: $TAG"

      - name: Summary
        run: |
          echo "## Release Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Module:** ${{ inputs.module }}" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** ${{ steps.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "**Tag:** ${{ steps.version.outputs.tag }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Installation" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
          echo "dagger install github.com/${{ github.repository }}/${{ inputs.module }}@${{ steps.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
